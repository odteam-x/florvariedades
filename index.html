<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2d7d4f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Sistema de Gestión</title>
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<!-- Estilos -->
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- LOADER (solo carga inicial) -->
<div class="loader" id="loader"><div class="spinner"></div></div>

<!-- TOP PROGRESS BAR (precarga silenciosa) -->
<div class="top-progress" id="topProgress"></div>

<!-- BUSY PILL (mutaciones: "Por favor espere...") -->
<div class="busy-pill" id="busyPill">
  <div class="mini-spinner"></div>
  <span id="busyPillText">Por favor espere...</span>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)cerrarModal()">
  <div class="modal" id="modalContent"></div>
</div>

<!-- MOBILE TOPBAR (solo móvil) -->
<header class="mobile-topbar" id="mobileTopbar">
  <button class="topbar-btn" id="btnHamburger" aria-label="Abrir menú" onclick="toggleSidebar()">
    <i data-lucide="menu"></i>
  </button>
  <div class="topbar-brand">
    <h1 id="topbarTitle">Mi Negocio</h1>
    <small id="topbarSubtitle">Dashboard</small>
  </div>
  <button class="topbar-btn" aria-label="Configuración" onclick="navegarA('config')">
    <i data-lucide="settings"></i>
  </button>
</header>

<!-- Overlay detrás del sidebar en móvil -->
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar(false)"></div>

<!-- APP -->
<div class="app">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2 id="sidebarTitle">Mi Negocio</h2>
      <small>Sistema de Gestión</small>
      <button class="sidebar-close" aria-label="Cerrar menú" onclick="toggleSidebar(false)">
        <i data-lucide="x"></i>
      </button>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item active" data-section="dashboard">
        <i data-lucide="layout-dashboard"></i>Dashboard
      </div>
      <div class="nav-item" data-section="pos">
        <i data-lucide="shopping-cart"></i>Punto de Venta
      </div>
      <div class="nav-item" data-section="facturas">
        <i data-lucide="file-text"></i>Facturas
      </div>
      <div class="nav-item" data-section="inventario">
        <i data-lucide="package"></i>Inventario
      </div>
      <div class="nav-item" data-section="clientes">
        <i data-lucide="users"></i>Clientes
      </div>
      <div class="nav-item" data-section="deudas">
        <i data-lucide="landmark"></i>Deudas
      </div>
      <div class="nav-item" data-section="ganancias">
        <i data-lucide="trending-up"></i>Ganancias
      </div>
      <div class="nav-item" data-section="gastos">
        <i data-lucide="wallet"></i>Gastos
      </div>
      <div class="nav-item" data-section="reportes">
        <i data-lucide="bar-chart-3"></i>Reportes
      </div>
      <div class="nav-item" data-section="config">
        <i data-lucide="settings"></i>Configuración
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="header">
      <h1 id="headerTitle">Dashboard</h1>
      <button class="btn btn-outline btn-sm" onclick="navegarA('config')">
        <i data-lucide="settings" style="width:16px;height:16px"></i> Config
      </button>
    </div>
    <div class="content" id="contentArea">
      <div class="section active" id="sec-dashboard"></div>
      <div class="section" id="sec-pos"></div>
      <div class="section" id="sec-facturas"></div>
      <div class="section" id="sec-inventario"></div>
      <div class="section" id="sec-clientes"></div>
      <div class="section" id="sec-deudas"></div>
      <div class="section" id="sec-ganancias"></div>
      <div class="section" id="sec-gastos"></div>
      <div class="section" id="sec-reportes"></div>
      <div class="section" id="sec-config"></div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV (MOBILE) — solo 5 items esenciales -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <div class="bnav-item active" data-section="dashboard">
      <i data-lucide="layout-dashboard"></i>Inicio
    </div>
    <div class="bnav-item" data-section="pos">
      <i data-lucide="shopping-cart"></i>POS
    </div>
    <div class="bnav-item" data-section="facturas">
      <i data-lucide="file-text"></i>Facturas
    </div>
    <div class="bnav-item" data-section="inventario">
      <i data-lucide="package"></i>Inventario
    </div>
    <div class="bnav-item" onclick="toggleSidebar(true)">
      <i data-lucide="menu"></i>Más
    </div>
  </div>
</nav>

<!-- App Logic -->
<script src="app.js"></script>
</body>
</html>
